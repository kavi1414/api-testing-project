name: API Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Newman
      run: npm install -g newman

    # 🔍 DEBUG: Show what files exist
    - name: Debug folder structure
      run: |
        echo "=== Root Directory ==="
        ls -la
        echo ""
        echo "=== Collections Folder ==="
        ls -la collections/ || echo "❌ collections folder not found!"
        echo ""
        echo "=== Environments Folder ==="
        ls -la environments/ || echo "❌ environments folder not found!"
        echo ""
        echo "=== Data Folder ==="
        ls -la data/ || echo "❌ data folder not found!"

    # ✅ RUN TESTS WITHOUT HTML REPORTER (to see real error)
    - name: Run API Tests
      run: |
        newman run "collections/API Testing Project - Posts Service.postman_collection.json" -e "environments/QA API Environment.postman_environment.json"